name: Deploy Hosting rewrite

on:
  push:
    branches:
      - main
    paths:
      - 'firebase.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JUN_MURAKAMI }}
      - run: npx firebase-tools@latest deploy --only hosting --project jun-murakami --non-interactive
